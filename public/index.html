<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Validador NFC-e</title>
<script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<h2>Validador NFC-e</h2>

<div id="reader" style="width:300px;"></div>

<pre id="resultado"></pre>

<script>
function onScanSuccess(decodedText) {
    fetch("/consulta?url=" + encodeURIComponent(decodedText))
    .then(res => res.json())
    .then(data => {
        document.getElementById("resultado").innerText =
`Empresa: ${data.empresa}
CNPJ: ${data.cnpj}
Data: ${data.data}
Nota: ${data.numero}
Chave: ${data.chave}
Valor: ${data.valor}`;
    });
}

new Html5QrcodeScanner("reader", { fps: 5 }).render(onScanSuccess);
</script>

</body>
</html>
